<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="LOGO.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/mylogo.png">
    <style>
      .container {
        width: 100%;
        height: 100vh;
        /* background-color: rgba(96, 150, 184, 0.65); */
        background-position: center;
        background-size: cover;
        position: relative;
      }

      .form-box {
        width: 90%;
        max-width: 500px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .form-box:hover {
        cursor: pointer;
      }

      .input-field {
        font-size: larger;
        margin-top: 5px;
        background: #eaeaea;
        margin: 15px 0;
        border-radius: 3px;
        display: flex;
        align-items: center;
        max-height: 65px;
        transition: max-height 0.5s;
        overflow: hidden;
      }

      .input-field i {
        margin-left: 15px;
        color: #999;
      }

      input {
        width: calc(100% - 40px);
        background: transparent;
        border: 0;
        outline: 0;
        padding: 18px 15px;
      }

      .btn-field button.disable {
        background: #eaeaea;
        color: #555;
      }

      .form-box h1 {
        font-size: 30px;
        margin-bottom: 50px;
        color: #3c00a0;
        position: relative;
        left: 33%;
      }

      .form-box h1::after {
        content: "";
        width: 30px;
        height: 4px;
        border-radius: 3px;
        background: #3c00a0;
        position: absolute;
        bottom: -15px;
        left: 14%;
        transform: translate(-50%);
      }

      form p {
        text-align: left;
        font-size: 13px;
        font-weight: 400;
      }

      form p a {
        text-decoration: none;
        color: #3c00a0;
      }

      .btn-field {
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 10px;
      }

      .btn-field button {
        flex-basis: 35%;
        background: #3c00a0;
        color: #fff;
        height: 40px;
        border-radius: 20px;
        border: 0;
        outline: 0;
        cursor: pointer;
        transition: background 0.5s;
      }
    </style>
    <title>GET HYPE - Sign In</title>
  </head>

  <body>
    <div class="container">
      <div class="form-box">
        <h1 id="title">Sign In</h1>
        <form onsubmit="handleSubmit(event)">
          <div class="input-group">
            <div class="input-field">
              <i class="fa fa-envelope" aria-hidden="true"></i>
              <input type="email" id="identifier" placeholder="Email" />
            </div>
            <div class="input-field">
              <i class="fa fa-lock" aria-hidden="true"></i>
              <input type="password" id="password" placeholder="Password" />
            </div>
            <p>Don't Have an Account? <a href="signup.html"> Click Here </a></p>
          </div>
          <div class="btn-field">
            <button type="submit" id="loginbtn">
              Sign In
            </button>
          </div>
        </form>
      </div>
    </div>
    <script>
      if (localStorage.getItem("token")) {
        window.location.href = "index.html";
      }

      async function postJSON(data) {
        try {
          const response = await fetch("http://localhost:1337/api/auth/local", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          });

          if (!response.ok) {
            throw new Error("Invalid credentials");
          }

          const result = await response.json();
          console.log("Success:", result);
          localStorage.setItem("token", result.jwt); // Store JWT token in localStorage

          alert("Logged in Successfully");
          window.location.href = "index.html";
        } catch (error) {
          console.error("Error:", error);
          alert("Invalid credentials");
        }
      }

      function handleSubmit(event) {
        event.preventDefault(); // Prevent default form submission

        const identifier = document.getElementById("identifier").value;
        const password = document.getElementById("password").value;

        if (identifier.trim() === "" || password.trim() === "") {
          alert("Please enter both email and password.");
          return;
        }

        const data = { identifier, password };
        postJSON(data);
      }
    </script>
  </body>
</html>
