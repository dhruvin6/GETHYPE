<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head content -->
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/templatemo-hexashop.css">
    <link rel="stylesheet" href="assets/css/owl-carousel.css">
    <link rel="stylesheet" href="assets/css/lightbox.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/mylogo.png">
</head>
<body>
    <header class="header-area header-sticky">
        <div class="container">
          <div class="row">
            <div class="col-12">
              <nav class="main-nav">
                <!-- ***** Logo Start ***** -->
                <a href="index.html" class="logo">
                  <img src="assets/images/mylogo.png" class="mylogo" />
                </a>
                <!-- ***** Logo End ***** -->
                <!-- ***** Menu Start ***** -->
                <ul class="nav">
                  <li class="scroll-to-section">
                    <a href="index.html">Home</a>
                  </li>
                  <li><a href="products.html">Product</a></li>
                  <li class="submenu">
                    <a href="javascript:;">Menu</a>
                    <ul>
                      <li><a href="about.html">About Us</a></li>
                      <li><a href="contact.html">Contact Us</a></li>
                      <li class="scroll-to-section">
                        <a href="#explore">Explore</a>
                      </li>
                    </ul>
                  </li>
                  
                  <li><a href="addtocart.html">MyCart[0]</a></li>
                  <li class="scroll-to-section" id="loginListItem">
                    <a href="login.html">Login</a>
                  </li>
                  <script>
                    document.addEventListener("DOMContentLoaded", function () {
                      const userToken = localStorage.getItem("userToken");
                      if (userToken) {
                        const loginListItem =
                          document.getElementById("loginListItem");
                        loginListItem.innerHTML = `<a href="profile.html">My Profile</a>`;
                        loginListItem.href = "profile.html";
                      }
                    });
                  </script>
                </ul>
                <a class="menu-trigger">
                  <span>Menu</span>
                </a>
                <!-- ***** Menu End ***** -->
              </nav>
            </div>
          </div>
        </div>
      </header>
    <!-- Main content -->
    <section class="section" id="cartDetail">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="section-heading">
                        <h2>Product Detail</h2>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-6">
                    <div id="productImage"></div>
                </div>
                <div class="col-lg-6" id="productDetails">
                    <!-- Product details will be displayed here -->
                </div>
            </div>
            
        </div>
    </section>

    <!-- JavaScript code -->
    <!-- JavaScript code -->
    <script>
        // Function to fetch product details by ID
        function fetchProductDetails(productId) {
            fetch(`http://localhost:1337/api/products/${productId}?populate=*`)
                .then((res) => res.json())
                .then((data) => {
                    displayProductDetails(data.data.attributes);
                })
                .catch((error) => {
                    console.error("Error fetching product details:", error);
                });
        }

        // Function to display product details on the page
        function displayProductDetails(product) {
            const imageUrl = `http://localhost:1337${product.image.data[0].attributes.url}`;
            const productImageHTML = `<img src="${imageUrl}" alt="${product.name}" class="img-fluid">`;
            document.getElementById("productImage").innerHTML = productImageHTML;

            const productDetailsHTML = `
                <h3>${product.name}</h3>
                <hr/>
                <p>Price: ₹${product.price}</p>
                <p>Size: ${product.size}</p>
                <p>Description: ${product.description || 'Not available'}</p>
                <p>Quote: ${product.quote || 'Not available'}</p>
                <button onclick="addToCart('${product.id}', '${product.name}', '${product.price}')">Add to Cart</button>
            `;
            document.getElementById("productDetails").innerHTML = productDetailsHTML;
        }

        // Function to add product to cart
        function addToCart(productId, productName, productPrice) {
            // Retrieve existing cart items from localStorage
            let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];

            // Check if the product is already in the cart
            const existingProductIndex = cartItems.findIndex(item => item.productId === productId);

            if (existingProductIndex === -1) {
                // Product is not in the cart, so add it
                cartItems.push({ productId: productId, name: productName, price: productPrice });
                localStorage.setItem("cartItems", JSON.stringify(cartItems));
                alert("Product added to cart successfully!");
            } else {
                // Product is already in the cart
                alert("This product is already in your cart!");
            }
        }

        // Get the product ID from the URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get("productId");

        // Fetch and display product details
        if (productId) {
            fetchProductDetails(productId);
        } else {
            console.error("Product ID not found in URL parameter");
        }
    </script>
</body>
</html>
