<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/mylogo.png">
  <title>Sign Up Success</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #3c00a0;
    }

    .btn {
      background-color: #3c00a0;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #4f00d4;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Successfully Account Created</h1>
    <p>Please Login to Proceed Further</p>
    <div style="padding-bottom: 10px">
      <a href="login.html" class="btn">Login</a>
    </div>
  </div>
</body>
</html>
